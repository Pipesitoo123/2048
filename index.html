<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>2048</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Inter',sans-serif;
  transition:background 0.3s,color 0.3s;
}

body{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

body.dark{
  background:linear-gradient(135deg,#1e1e2f,#3a3a5f);
  color:white;
}

body.light{
  background:linear-gradient(135deg,#f4f4f4,#dddddd);
  color:#222;
}

h1{
  font-size:42px;
  font-weight:800;
  margin-bottom:15px;
}

.top-bar{
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.score-box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:12px 20px;
  border-radius:15px;
  text-align:center;
  min-width:90px;
}

body.light .score-box{
  background:rgba(0,0,0,0.08);
}

.score-box span{
  font-size:13px;
  opacity:0.7;
  display:block;
}

.score-box strong{
  font-size:20px;
}

button{
  padding:10px 16px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(45deg,#ff9966,#ff5e62);
  color:white;
}

#game{
  width:min(95vw,480px);
  aspect-ratio:1/1;
  padding:15px;
  border-radius:25px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  backdrop-filter:blur(15px);
  position:relative;
}

body.dark #game{
  background:rgba(255,255,255,0.08);
}

body.light #game{
  background:rgba(0,0,0,0.05);
}

.tile{
  aspect-ratio:1/1;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:24px;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.7);opacity:0.5;}
  to{transform:scale(1);opacity:1;}
}

[data-value="0"]{background:rgba(255,255,255,0.05);}
[data-value="2"]{background:#eee4da;color:#333;}
[data-value="4"]{background:#ede0c8;color:#333;}
[data-value="8"]{background:#f2b179;}
[data-value="16"]{background:#f59563;}
[data-value="32"]{background:#f67c5f;}
[data-value="64"]{background:#f65e3b;}
[data-value="128"]{background:#edcf72;}
[data-value="256"]{background:#edcc61;}
[data-value="512"]{background:#edc850;}
[data-value="1024"]{background:#edc53f;}
[data-value="2048"]{background:gold;color:black;}

#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
  font-size:36px;
  font-weight:800;
  color:white;
  z-index:20;
  border-radius:25px;
}

.confetti{
  position:fixed;
  width:8px;
  height:8px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

/* ===== Tiles Panel ===== */

#tilesPanel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
  overflow-y:auto;
}

.tilesContent{
  background:rgba(30,30,40,0.95);
  padding:30px;
  border-radius:20px;
  width:min(90vw,400px);
  max-height:90vh;
  text-align:center;
  position:relative;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:15px;
}

body.light .tilesContent{
  background:white;
  color:black;
}

.closeBtn{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
}

.tile-entry{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
}
.tile-entry .tile{
  width:40px !important;
  font-size:16px !important;
  aspect-ratio:1/1;
}
.tile-entry div:last-child{
  font-weight:600;
}
</style>
</head>

<body class="dark">

<h1>2048</h1>

<div class="top-bar">
  <div class="score-box">
    <span>Score</span>
    <strong id="score">0</strong>
  </div>
  <div class="score-box">
    <span>Best</span>
    <strong id="best">0</strong>
  </div>
  <button onclick="init()">Restart</button>
  <button onclick="toggleTheme()">🌗</button>
  <button onclick="openTiles()">Tiles</button>
</div>

<div id="game">
  <div id="overlay"></div>
</div>

<!-- Tiles Popup -->
<div id="tilesPanel">
  <div class="tilesContent">
    <button class="closeBtn" onclick="closeTiles()">✖</button>
    <div id="tilesContainer"></div>
  </div>
</div>

<script>
let board=[];
let score=0;
let best=localStorage.getItem("best2048")||0;
let unlocked=JSON.parse(localStorage.getItem("unlockedTiles2048"))||[];
const size=4;

const game=document.getElementById("game");
const scoreDisplay=document.getElementById("score");
const bestDisplay=document.getElementById("best");
const overlay=document.getElementById("overlay");

bestDisplay.textContent=best;

if(localStorage.getItem("theme"))
  document.body.className=localStorage.getItem("theme");

function toggleTheme(){
  if(document.body.classList.contains("dark")){
    document.body.className="light";
    localStorage.setItem("theme","light");
  }else{
    document.body.className="dark";
    localStorage.setItem("theme","dark");
  }
}

function init(){
  board=Array(size).fill().map(()=>Array(size).fill(0));
  score=0;
  overlay.style.display="none";
  addTile();
  addTile();
  updateBoard();
}

function addTile(){
  let empty=[];
  for(let r=0;r<size;r++)
    for(let c=0;c<size;c++)
      if(board[r][c]===0) empty.push({r,c});
  if(!empty.length) return;
  let spot=empty[Math.floor(Math.random()*empty.length)];
  board[spot.r][spot.c]=Math.random()<0.9?2:4;
}

function updateBoard(){
  game.querySelectorAll(".tile").forEach(t=>t.remove());

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      let tile=document.createElement("div");
      tile.className="tile";
      tile.textContent=board[r][c]===0?"":board[r][c];
      tile.setAttribute("data-value",board[r][c]);
      game.insertBefore(tile, overlay);
    }
  }

  scoreDisplay.textContent=score;

  if(score>best){
    best=score;
    localStorage.setItem("best2048",best);
    bestDisplay.textContent=best;
  }

  checkGameState();
}

function slide(row){
  row=row.filter(v=>v);
  for(let i=0;i<row.length-1;i++){
    if(row[i]===row[i+1]){
      row[i]*=2;
      score+=row[i];
      row[i+1]=0;

      if(!unlocked.includes(row[i])){
        unlocked.push(row[i]);
        localStorage.setItem("unlockedTiles2048",JSON.stringify(unlocked));
      }
    }
  }
  row=row.filter(v=>v);
  while(row.length<size) row.push(0);
  return row;
}

function rotate(){
  board=board[0].map((_,i)=>board.map(row=>row[i])).reverse();
}

function move(dir){
  let old=JSON.stringify(board);
  for(let i=0;i<dir;i++) rotate();
  for(let r=0;r<size;r++) board[r]=slide(board[r]);
  for(let i=0;i<(4-dir)%4;i++) rotate();
  if(JSON.stringify(board)!==old){
    addTile();
    updateBoard();
  }
}

function checkGameState(){
  for(let r=0;r<size;r++)
    for(let c=0;c<size;c++)
      if(board[r][c]===2048){
        showMessage("YOU WIN 🎉");
        confettiExplosion();
      }

  for(let r=0;r<size;r++)
    for(let c=0;c<size;c++)
      if(board[r][c]===0) return;

  for(let r=0;r<size;r++)
    for(let c=0;c<size-1;c++)
      if(board[r][c]===board[r][c+1]) return;

  for(let c=0;c<size;c++)
    for(let r=0;r<size-1;r++)
      if(board[r][c]===board[r+1][c]) return;

  showMessage("GAME OVER 💀");
}

function showMessage(text){
  overlay.innerHTML=`<div>${text}</div><button onclick="init()">Retry</button>`;
  overlay.style.display="flex";
}

function confettiExplosion(){
  for(let i=0;i<120;i++){
    let conf=document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background=`hsl(${Math.random()*360},100%,50%)`;
    conf.style.animationDuration=(2+Math.random()*2)+"s";
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),4000);
  }
}

/* ===== Tiles Panel Functions ===== */

function openTiles(){
  const panel=document.getElementById("tilesPanel");
  const container=document.getElementById("tilesContainer");

  const tileValues=[2,4,8,16,32,64,128,256,512,1024,2048];

  container.innerHTML="";

  tileValues.forEach(val=>{
    const entry=document.createElement("div");
    entry.className="tile-entry";

    const tile=document.createElement("div");
    tile.className="tile";
    tile.setAttribute("data-value",val);
    tile.textContent=val;

    const status=document.createElement("div");
    status.textContent=unlocked.includes(val) ? "Unlocked" : "Locked";
    status.style.color=unlocked.includes(val) ? "lime" : "gray";

    entry.appendChild(tile);
    entry.appendChild(status);
    container.appendChild(entry);
  });

  panel.style.display="flex";
}

function closeTiles(){
  document.getElementById("tilesPanel").style.display="none";
}

/* ===== Arrow Keys Fix for GitHub Pages ===== */

window.addEventListener("keydown", function(e){
  if(["ArrowLeft","ArrowUp","ArrowRight","ArrowDown"].includes(e.key)){
    e.preventDefault();
    switch(e.key){
      case "ArrowLeft": move(0); break;
      case "ArrowUp": move(1); break;
      case "ArrowRight": move(2); break;
      case "ArrowDown": move(3); break;
    }
  }
}, {passive: false});

/* ===== Touch Controls ===== */

let startX,startY;
game.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});
game.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>30) move(2);
    else if(dx<-30) move(0);
  }else{
    if(dy>30) move(3);
    else if(dy<-30) move(1);
  }
});

init();
</script>

</body>
  </html>
